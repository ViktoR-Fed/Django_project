{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой блог</title>
  <meta name="description" content="Простой шаблон блога">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Bootstrap core CSS -->
  <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1a1a2e;
      line-height: 1.6;
    }

    /* Контейнер */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Шапка */
    .header {
      background: white;
      border-bottom: 1px solid #eaeef2;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      flex-wrap: wrap;
      gap: 20px;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .logo a {
      text-decoration: none;
      color: #1a1a2e;
    }
    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: #4a5568;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: #3b82f6;
    }

    /* Основной контент */
    .main-content {
      min-height: calc(100vh - 200px);
      padding: 60px 0;
    }

    /* Сетка блога */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 40px;
    }

    /* Карточка поста */
    .post-card {
      border: 1px solid #eaeef2;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.2s;
      background: white;
    }
    .post-card:hover {
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transform: translateY(-4px);
    }
    .card-content {
      padding: 24px;
    }
    .post-meta {
      font-size: 0.85rem;
      color: #6c757d;
      margin-bottom: 12px;
      display: flex;
      gap: 15px;
    }
    .post-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .post-title a {
      text-decoration: none;
      color: #1a1a2e;
    }
    .post-title a:hover {
      color: #3b82f6;
    }
    .post-excerpt {
      color: #4a5568;
      margin-bottom: 20px;
    }
    .read-more {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .read-more:hover {
      gap: 10px;
    }

    /* Страница отдельного поста */
    .single-post {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 24px;
      border: 1px solid #eaeef2;
    }
    .single-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eaeef2;
    }
    .single-header h1 {
      font-size: 2.2rem;
      margin: 16px 0 12px;
    }
    .single-meta {
      color: #6c757d;
      font-size: 0.9rem;
      display: flex;
      gap: 20px;
    }
    .single-content {
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .single-content p {
      margin-bottom: 1.4rem;
    }
    .single-content h2 {
      margin: 1.8rem 0 1rem;
      font-size: 1.6rem;
    }

    /* Пагинация */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 50px;
    }
    .pagination a {
      padding: 8px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 30px;
      text-decoration: none;
      color: #1a1a2e;
    }
    .pagination a.active,
    .pagination a:hover {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }

    /* Кнопка назад */
    .back-home {
      display: inline-block;
      margin-top: 40px;
      padding: 10px 24px;
      background: #f1f5f9;
      border-radius: 40px;
      text-decoration: none;
      color: #1a1a2e;
      font-weight: 500;
    }
    .back-home:hover {
      background: #e2e8f0;
    }

    /* Футер */
    .footer {
      background: #f8fafc;
      border-top: 1px solid #eaeef2;
      padding: 40px 0;
      text-align: center;
      color: #64748b;
    }
    .footer a {
      color: #3b82f6;
      text-decoration: none;
    }

    /* Адаптив */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
      }
      .nav-links {
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .single-post {
        padding: 24px;
      }
      .single-header h1 {
        font-size: 1.7rem;
      }
      .blog-grid {
        gap: 25px;
      }
    }
  </style>
</head>
<body>

<header >
  {% include 'blog/includes/header.html' %}
</header>

<main class="main-content">
  <div class="container">
    {% block content %}
    {% endblock %}
  </div>
</main>

<footer class="footer">
{% include 'blog/includes/footer.html' %}
</footer>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>

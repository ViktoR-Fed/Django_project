{% extends 'blog/base.html' %}


{% block content %}
<div class="container mt-4">
    <article>
        <h1 class="mb-3">{{ blog.title }}</h1>

        <div class="text-muted mb-4">
            <i class="bi bi-eye"></i> Просмотров: {{ blog.views_counter }} |
            <i class="bi bi-calendar"></i> {{ blog.created_at|date:"d.m.Y" }}
        </div>

        {% if blog.photo %}
            <div class="text-center mb-4">
                <img src="{{ blog.photo.url }}" alt="{{ blog.title }}" class="img-fluid rounded">
            </div>
        {% endif %}

        <div class="content">
            {{ blog.content|linebreaks }}
        </div>

        <div class="mt-4">
            <a href="{% url 'blog:blog_list' %}" class="btn btn-secondary">
                ← Назад к списку статей
            </a>
            <a href="{% url 'blog:blog_update' blog.pk %}" class="btn btn-secondary">
                Редактировать
            </a>
            <a href="{% url 'blog:blog_delite' blog.pk %}" class="btn btn-danger">
                Удалить
            </a>
        </div>
    </article>
</div>
{% endblock %}
